# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - deiafrica

on:
  push:
    branches:
      - main
      - feature/coderabbit-setup
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '24.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          cd server && npm install --production && cd ..

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp -r server deploy/server
          cp package.json deploy/package.json
          cp web.config deploy/web.config

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deploy

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5C2345BD2338497CB446DEDAC724C0CF }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_12DD5DFE38C24744B7CA3FDA00D7D1B5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7FF3B173AAD94AAFB71332D2B833A454 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'deiafrica'
          slot-name: 'Production'
          package: ./deploy
          startup-command: 'node server/server.js'
          